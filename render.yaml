databases:
  - name: ysa-lessons-db
    databaseName: lessons
    user: lessons
    plan: free

services:
  - type: web
    name: ysa-lessons-api
    env: python
    plan: free
    rootDir: .
    buildCommand: >
      pip install -r requirements.txt &&
      cd frontend && npm install && npm run build && cd .. &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn lessons.wsgi:application --workers 2 --timeout 120
    healthCheckPath: /health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true

      - key: DJANGO_DEBUG
        value: "False"

      - key: DJANGO_ALLOWED_HOSTS
        value: teachstem.onrender.com

      - key: CSRF_TRUSTED_ORIGINS
        value: https://teachstem.onrender.com

      - key: DB_HOST
        fromDatabase:
          name: ysa-lessons-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: ysa-lessons-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: ysa-lessons-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: ysa-lessons-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: ysa-lessons-db
          property: password
      - key: DB_SSLMODE
        value: require

      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"

      # S3 for media uploads — set these manually in the Render dashboard.
      - key: AWS_STORAGE_BUCKET_NAME
        sync: false
      - key: AWS_S3_REGION_NAME
        value: us-east-1
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
