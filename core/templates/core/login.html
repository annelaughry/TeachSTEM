{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Log In — Lesson Database</title>
  <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body>

<nav class="navbar">
  <a href="/" style="color:#fff; text-decoration:none; font-size:0.9rem;">&#8592; Back to Lessons</a>
  <span class="navbar-brand">Lesson Database</span>
</nav>

<div class="container" style="margin-top:120px; max-width:420px;">
  <div class="form-container">
    <h2 style="text-align:center; color:#ff5c77; margin-bottom:1.5rem;">Log In</h2>

    {% if error %}
      <p style="color:#c0392b; text-align:center; margin-bottom:1rem;">{{ error }}</p>
    {% endif %}

    <form method="post">
      {% csrf_token %}
      <input type="hidden" name="next" value="{{ request.GET.next }}">
      <div class="form-group" style="margin-bottom:1rem;">
        <label for="username">Username</label>
        <input id="username" name="username" type="text" autofocus>
      </div>
      <div class="form-group" style="margin-bottom:1.5rem;">
        <label for="password">Password</label>
        <input id="password" name="password" type="password">
      </div>
      <div class="button-group">
        <button type="submit" class="btn">Log In</button>
      </div>
    </form>

    <div style="text-align:center; margin-top:1.5rem; font-size:0.88rem; color:#888; border-top:1px solid #eee; padding-top:1.25rem;">
      <p style="margin:0 0 0.5rem;">New here?</p>
      <a href="/student/register/" style="color:#ff5c77; display:inline-block; margin-right:1rem;">Create student account</a>
      <a href="/register/" style="color:#888;">Request teacher access</a>
    </div>
  </div>
</div>

<footer>
  <p>Young Scientist Academy &mdash; Lesson Database</p>
</footer>

</body>
</html>
